version: 2
updates:
  # Enable npm dependency updates for the root package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "qcoder-team"
    assignees:
      - "maintainer"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "automerge-ready"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "@mariozechner/pi-tui"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@mariozechner/pi-coding-agent"
        update-types: ["version-update:semver-major"]
    security-updates: true
    pull-request-branch-name:
      separator: "-"

  # Enable GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
    pull-request-branch-name:
      separator: "-"
