name: Bug Report
description: File a bug report
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

        Please provide as much detail as possible to help us diagnose and fix the issue.
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create a TUI with ...
        2. Add a ChatContainer ...
        3. Call method ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Terminal Output
      description: If applicable, add screenshots or terminal output to help explain your problem.
      render: shell
  - type: input
    id: package-version
    attributes:
      label: Package Version
      description: Which version of @mariozechner/pi-tui-professional are you using?
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Which Node.js version are you using?
      placeholder: "20.0.0"
    validations:
      required: true
  - type: input
    id: os-platform
    attributes:
      label: OS / Platform
      description: What operating system and terminal are you using?
      placeholder: "macOS 14 + iTerm2"
    validations:
      required: true
  - type: input
    id: pi-tui-version
    attributes:
      label: @mariozechner/pi-tui Version
      description: Which version of pi-tui are you using?
      placeholder: "0.68.0"
    validations:
      required: true
  - type: input
    id: pi-coding-agent-version
    attributes:
      label: @mariozechner/pi-coding-agent Version
      description: Which version of pi-coding-agent are you using?
      placeholder: "0.68.0"
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (code snippets, logs, etc.).
      render: shell
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues for duplicate bug reports
          required: true
        - label: I have provided a minimal reproducible example
          required: false
        - label: I have included relevant logs/screenshots
          required: false
